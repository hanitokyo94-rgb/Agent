<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>موقعي البسيط</title>
  <style>
    :root{--bg:#0b1220;--card:#111b33;--text:#eaf0ff;--muted:#a9b4d0;--accent:#7c5cff;}
    *{box-sizing:border-box}
    body{
      margin:0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(1200px 700px at 20% 0%, rgba(124,92,255,.35), transparent 55%), var(--bg);
      color:var(--text);
      min-height:100vh;
      display:flex;
      align-items:center;
      justify-content:center;
      padding:24px;
    }
    .card{
      width:min(720px, 100%);
      background:linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border:1px solid rgba(255,255,255,.10);
      border-radius:16px;
      box-shadow: 0 18px 60px rgba(0,0,0,.35);
      padding:24px;
    }
    h1{margin:0 0 8px; font-size:28px; letter-spacing:.2px;}
    p{margin:0 0 16px; color:var(--muted); line-height:1.7}
    .row{display:flex; gap:12px; flex-wrap:wrap; align-items:center;}
    .btn{
      appearance:none; border:0; cursor:pointer;
      background:var(--accent); color:white;
      padding:10px 14px; border-radius:12px;
      font-weight:600;
      transition:transform .12s ease, filter .12s ease;
    }
    .btn:hover{filter:brightness(1.06)}
    .btn:active{transform:scale(.98)}
    .link{
      color:var(--text);
      text-decoration:none;
      border:1px solid rgba(255,255,255,.14);
      padding:10px 14px; border-radius:12px;
      font-weight:600;
      transition:background .12s ease;
    }
    .link:hover{background:rgba(255,255,255,.06)}
    .small{font-size:12.5px; color:rgba(234,240,255,.7); margin-top:14px;}
  </style>
</head>
<body>
  <main class="card" role="main" aria-label="موقعي البسيط">
    <h1>مرحبًا! 👋</h1>
    <p>
      هذا موقع بسيط جدًا بملف <strong>index.html</strong> فقط.
      تقدر تغيّر النصوص بسهولة مباشرة من الكود.
    </p>

    <div class="row">
      <button class="btn" id="btn">اضغط لتجربة</button>
      <a class="link" href="#about">تعرف علينا</a>
    </div>

    <p class="small" id="msg" aria-live="polite"></p>

    <section id="about" style="margin-top:18px; padding-top:14px; border-top:1px dashed rgba(255,255,255,.18);">
      <p style="margin:0; color:var(--muted);">
        بإمكانك لاحقًا تضيف أقسام أو روابط فقط داخل نفس الملف.
      </p>
    </section>
  </main>

  <script>
    const btn = document.getElementById('btn');
    const msg = document.getElementById('msg');
    btn.addEventListener('click', () => {
      msg.textContent = 'تم! ✅ (تعديل سهل—جرّب تغيّر الرسالة داخل index.html)';
    });
  </script>
</body>
</html>
