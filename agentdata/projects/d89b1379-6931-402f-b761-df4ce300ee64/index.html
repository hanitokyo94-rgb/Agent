<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>موقعي البسيط</title>
    <style>
      :root {
        --bg: #0b1220;
        --card: rgba(255, 255, 255, 0.06);
        --text: rgba(255, 255, 255, 0.92);
        --muted: rgba(255, 255, 255, 0.65);
        --border: rgba(255, 255, 255, 0.12);
        --primary: #7c3aed;
        --primary-2: #22c55e;
      }

      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: ui-sans-serif, system-ui, -apple-system, Segoe UI, Roboto, Arial, "Noto Sans Arabic", "Noto Sans", sans-serif;
        background: radial-gradient(1200px 600px at 30% 0%, rgba(124, 58, 237, 0.35), transparent 60%),
                    radial-gradient(900px 500px at 80% 10%, rgba(34, 197, 94, 0.25), transparent 55%),
                    var(--bg);
        color: var(--text);
      }

      .wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }

      .card {
        width: min(720px, 100%);
        background: var(--card);
        border: 1px solid var(--border);
        border-radius: 16px;
        box-shadow: 0 20px 60px rgba(0,0,0,0.35);
        padding: 24px;
        backdrop-filter: blur(10px);
      }

      header {
        display: flex;
        gap: 12px;
        align-items: center;
        justify-content: flex-start;
        margin-bottom: 16px;
      }

      .logo {
        width: 44px;
        height: 44px;
        border-radius: 14px;
        background: linear-gradient(135deg, rgba(124,58,237,1), rgba(34,197,94,1));
        border: 1px solid rgba(255,255,255,0.25);
        display: grid;
        place-items: center;
        font-weight: 800;
        color: rgba(255,255,255,0.95);
      }

      h1 {
        margin: 0;
        font-size: 20px;
        letter-spacing: 0.2px;
      }

      p {
        margin: 0;
        color: var(--muted);
        line-height: 1.7;
        font-size: 14.5px;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
        margin-top: 18px;
      }

      button {
        cursor: pointer;
        border: 1px solid rgba(255,255,255,0.18);
        background: rgba(255,255,255,0.06);
        color: var(--text);
        padding: 10px 14px;
        border-radius: 12px;
        font-weight: 600;
        transition: transform 120ms ease, background 160ms ease, border-color 160ms ease;
      }

      button:hover { background: rgba(255,255,255,0.10); }
      button:active { transform: scale(0.98); }

      .primary {
        background: rgba(124,58,237,0.22);
        border-color: rgba(124,58,237,0.45);
      }
      .primary:hover { background: rgba(124,58,237,0.30); }

      .hint {
        margin-top: 14px;
        padding-top: 14px;
        border-top: 1px dashed rgba(255,255,255,0.16);
        color: var(--muted);
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 18px;
      }

      .mini {
        border: 1px solid rgba(255,255,255,0.12);
        border-radius: 14px;
        padding: 14px;
        background: rgba(255,255,255,0.04);
      }

      .mini b { display:block; margin-bottom: 6px; }

      @media (max-width: 640px) {
        .grid { grid-template-columns: 1fr; }
        header { justify-content: center; text-align: center; }
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <main class="card" role="main">
        <header>
          <div class="logo">M</div>
          <div>
            <h1>موقعي البسيط</h1>
            <p>صفحة واحدة (index.html) — جاهزة للمعاينة مباشرة.</p>
          </div>
        </header>

        <section class="grid" aria-label="معلومات">
          <div class="mini">
            <b>✨ تصميم نظيف</b>
            <div>ألوان وخلفية ناعمة مع بطاقة مركزية.</div>
          </div>
          <div class="mini">
            <b>⚡ سريع</b>
            <div>لا يوجد أي اعتماد على ملفات إضافية — فقط HTML + CSS.</div>
          </div>
        </section>

        <div class="actions">
          <button class="primary" onclick="showToast()">اضغط لعرض رسالة</button>
          <button onclick="toggleTheme()">تبديل الوضع</button>
        </div>

        <div class="hint" id="hint">جاهز — جرّب الأزرار.</div>
      </main>
    </div>

    <script>
      let dark = true;

      function setHint(text) {
        const el = document.getElementById('hint');
        el.textContent = text;
      }

      function showToast() {
        setHint('✓ تم الضغط! هذه مجرد رسالة من صفحة واحدة.');
      }

      function toggleTheme() {
        dark = !dark;
        const root = document.documentElement;
        if (dark) {
          root.style.setProperty('--bg', '#0b1220');
          root.style.setProperty('--text', 'rgba(255,255,255,0.92)');
          root.style.setProperty('--muted', 'rgba(255,255,255,0.65)');
          setHint('الوضع: ليلي');
        } else {
          root.style.setProperty('--bg', '#f7f7fb');
          root.style.setProperty('--text', 'rgba(10,20,40,0.92)');
          root.style.setProperty('--muted', 'rgba(10,20,40,0.62)');
          setHint('الوضع: نهاري');
        }
      }
    </script>
  </body>
</html>
